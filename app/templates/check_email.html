<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Your Email</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
            margin: 15px 0;
        }

        .email {
            font-weight: bold;
            color: #007BFF;
        }

        .note {
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Check Your Email 📧</h1>
        <p>We’ve sent a verification link to:</p>
        <p class="email">check email</p>

        <p>Please click the link in your email to verify your account.</p>

        <p class="note">If you don’t see the email, check your spam folder.</p>
    </div>
</body>
</html>
